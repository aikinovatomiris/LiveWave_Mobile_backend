# DATABASE (Docker)
spring.datasource.url=jdbc:postgresql://db:5432/ticket_db
spring.datasource.username=postgres
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# Server
server.tomcat.connection-timeout=20000
server.port=8080

# Logging
logging.level.com.livewave=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.root=INFO
logging.level.com.livewave.ticket_api=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Exception Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# GraphQL
spring.graphql.path=/graphql
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql

# SFTP (????????? ??? ??)
sftp.host=${SFTP_HOST:sftp}
sftp.port=${SFTP_PORT:22}
sftp.username=${SFTP_USER:demo}
sftp.password=${SFTP_PASS:demo}
sftp.remote-dir=/home/demo/upload

file.upload.max-size=5242880
file.upload.allowed-ext=png,jpg,jpeg,pdf